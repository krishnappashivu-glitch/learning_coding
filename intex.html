<!DOCTYPE html>
<html>
<head>
    <title>Tech Store</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        /* Header */
        header {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* Search Bar */
        .search {
            text-align: center;
            margin: 20px;
        }

        .search input {
            width: 50%;
            padding: 10px;
            border-radius: 5px;
        }

        /* Layout */
        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #fff;
            padding: 15px;
        }

        /* Products */
        .products {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            flex: 1;
        }

        /* Product Card */
        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card img {
            width: 100%;
            height: 150px;
        }

        /* Hover Effect */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        button {
            background: green;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h2>Tech Store</h2>
    <div>Home | Shop | Cart</div>
</header>

<div class="search">
    <input type="text" placeholder="Search gadgets...">
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Filters</h3>
        <p>Category</p>
        <p>Price</p>
        <p>Brand</p>
    </div>

    <!-- Products -->
    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>iPhone 14</h4>
            <p>₹79,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Samsung S23</h4>
            <p>₹69,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Sony Headphones</h4>
            <p>₹9,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Dell Laptop</h4>
            <p>₹59,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Apple Watch</h4>
            <p>₹29,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h4>Boat Earbuds</h4>
            <p>₹2,999</p>
            <button>Add to Cart</button>
        </div>

    </div>

</div>

</body>
</html>
